version: "3.8"

services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  solr:
    image: solr:9
    container_name: solr
    ports:
      - "8983:8983"
    volumes:
      - ./solr/movies:/var/solr/data/movies
    command:
      - solr-precreate
      - movies
      - /var/solr/data/movies

volumes:
  mysql_data: